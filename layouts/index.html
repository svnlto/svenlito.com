  <style>
    :root {
      --bg: #FAFAF7; --ink: #15140F; --ink-body: #2C2A23;
      --teal: #1F8A7D; --meta: #6B675C; --accent-gray: #74736E;
      --hairline: #C8C2B1; --pill: #FCFCFA;
      --serif: "Fraunces", Georgia, serif;
      --sans: "Inter Tight", system-ui, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: var(--teal); color: #fff; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg); color: var(--ink-body);
      font-family: var(--sans); font-size: 15px; line-height: 1.55;
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    .wrap { max-width: 680px; margin: 0 auto; padding: 4rem 1.75rem 5rem; }
    a { color: var(--teal); text-decoration: none; }
    a:hover { text-decoration: underline; }
    :focus-visible { outline: 2px solid var(--teal); outline-offset: 3px; border-radius: 2px; }
    .rule { border: 0; border-top: 1px solid var(--hairline); margin: 0.75rem 0 1.25rem; }
    @media (max-width: 520px) { .wrap { padding: 2.5rem 1.25rem 3.5rem; } }
  </style>
</head>
