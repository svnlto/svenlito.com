name: Deploy Hugo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.164.0"
    steps:
      - uses: actions/checkout@v4
      - name: Install Hugo
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Build
        run: hugo --minify
      - name: Generate PDF from rendered site
        run: |
          python3 -m http.server 8000 --directory public &
          SRV=$!
          for i in $(seq 1 20); do curl -sf http://localhost:8000/ >/dev/null && break; sleep 0.5; done
          google-chrome --headless=new --disable-gpu --no-sandbox --no-pdf-header-footer \
            --virtual-time-budget=10000 \
            --print-to-pdf=public/sven-lito-cv.pdf "http://localhost:8000/?pdf"
          kill $SRV
          test -s public/sven-lito-cv.pdf && echo "PDF generated ($(wc -c < public/sven-lito-cv.pdf) bytes)"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
